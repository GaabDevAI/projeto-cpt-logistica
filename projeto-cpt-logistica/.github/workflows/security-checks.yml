name: security-checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit
          pip install -r requirements.txt

      - name: Audit dependencies
        run: pip-audit -r requirements.txt

      - name: Static security scan
        run: bandit -r app.py src scripts --skip B311

      - name: Compile Python files
        run: python -m compileall app.py src scripts

      - name: Regenerate fictitious data
        run: python scripts/gerar_dados_ficticios.py

      - name: Generate demo Excel file
        run: python scripts/gerar_planilha_bi.py
